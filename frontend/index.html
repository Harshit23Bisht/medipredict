<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediPredict</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Vars ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080b14;
        --surface: #0f1624;
        --surface2: #162030;
        --border: rgba(255, 255, 255, 0.07);
        --text: #dde3f0;
        --muted: #4a5568;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.15);
        --low: #10b981;
        --low-dim: rgba(16, 185, 129, 0.12);
        --med: #f59e0b;
        --med-dim: rgba(245, 158, 11, 0.12);
        --high: #ef4444;
        --high-dim: rgba(239, 68, 68, 0.12);
        --mono: "IBM Plex Mono", monospace;
        --body: "Inter", sans-serif;
        --radius: 12px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
      }

      /* ── Header ── */
      .header {
        border-bottom: 1px solid var(--border);
        background: rgba(8, 11, 20, 0.9);
        backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .header-inner {
        max-width: 1080px;
        margin: 0 auto;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-hex {
        width: 32px;
        height: 32px;
        background: var(--accent);
        clip-path: polygon(
          50% 0%,
          100% 25%,
          100% 75%,
          50% 100%,
          0% 75%,
          0% 25%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 600;
        color: #fff;
      }
      .logo-name {
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .logo-name span {
        color: var(--accent);
      }
      .header-tag {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Layout ── */
      .main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 36px 28px 72px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 32px;
        position: relative;
        overflow: hidden;
      }
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.025) 0%,
          transparent 50%
        );
      }
      .card-title {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 22px;
      }

      /* ── Form ── */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      @media (max-width: 640px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
      .field label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .field input[type="number"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px 16px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        -moz-appearance: textfield;
      }
      .field input[type="number"]::-webkit-outer-spin-button,
      .field input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      .field input[type="number"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      /* ── Drop zone ── */
      .dropzone {
        width: 100%;
        min-height: 100px;
        border: 1.5px dashed var(--border);
        border-radius: 10px;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        overflow: hidden;
      }
      .dropzone:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .dropzone-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px;
      }
      .dropzone-icon {
        font-size: 26px;
      }
      .dropzone-text {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }
      .dropzone-text strong {
        color: var(--text);
      }
      .drop-preview {
        width: 100%;
        height: 100px;
        object-fit: cover;
      }

      /* ── Buttons ── */
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 4px;
      }
      .btn-primary {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 11px 28px;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.2s;
      }
      .btn-primary:hover:not(:disabled) {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.35);
        opacity: 0.92;
      }
      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 18px;
        color: var(--muted);
        font-size: 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      /* ── Spinner ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
      }

      /* ── Error ── */
      .error {
        margin-top: 14px;
        padding: 11px 16px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: #f87171;
        font-size: 13px;
        line-height: 1.5;
      }

      /* ── Results grid ── */
      .results {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 20px;
      }
      @media (max-width: 800px) {
        .results {
          grid-template-columns: 1fr;
        }
      }

      /* ── Risk badge ── */
      .risk-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        border-radius: 999px;
        border: 1px solid;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.07em;
      }

      /* ── Gauge (SVG arc) ── */
      .gauge-wrap {
        display: flex;
        justify-content: center;
        margin: 8px 0 20px;
      }
      .gauge {
        width: 180px;
        height: 110px;
        overflow: visible;
      }
      .gauge-track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 12;
        stroke-linecap: round;
      }
      .gauge-fill {
        fill: none;
        stroke-width: 12;
        stroke-linecap: round;
        transition:
          stroke-dasharray 0.9s cubic-bezier(0.34, 1.56, 0.64, 1),
          stroke 0.4s;
      }
      .gauge-pct {
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 600;
      }
      .gauge-label {
        font-family: var(--mono);
        font-size: 8px;
        letter-spacing: 0.12em;
        fill: #4a5568;
      }

      /* ── Score bars ── */
      .score-list {
        display: flex;
        flex-direction: column;
        gap: 13px;
        margin-bottom: 20px;
      }
      .score-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .score-name {
        font-size: 12px;
        color: var(--muted);
        min-width: 72px;
        font-family: var(--mono);
      }
      .bar-track {
        flex: 1;
        height: 5px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .score-val {
        font-family: var(--mono);
        font-size: 12px;
        min-width: 40px;
        text-align: right;
      }
      .na {
        color: var(--muted) !important;
      }

      /* ── Weights ── */
      .weights {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }
      .chip {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.05em;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }

      /* ── Info panel (right side) ── */
      .info-panels {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .enc-detail {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .detail-item {
        background: var(--surface2);
        border-radius: 8px;
        padding: 12px 14px;
      }
      .detail-label {
        font-size: 10px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .detail-val {
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 600;
      }

      /* ── Placeholder panels ── */
      .placeholder {
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
      }
      .ph-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .ph-icon {
        font-size: 18px;
      }
      .ph-title {
        font-size: 14px;
        font-weight: 500;
      }
      .ph-badge {
        margin-left: auto;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 2px 9px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.1);
        color: var(--med);
        border: 1px solid rgba(245, 158, 11, 0.25);
        font-family: var(--mono);
      }
      .ph-desc {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 14px;
      }
      .mock-bars {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 48px;
      }
      .mock-bar {
        flex: 1;
        background: var(--accent);
        border-radius: 2px 2px 0 0;
        opacity: 0.12;
      }
      .shap-rows {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .shap-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .shap-name {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        min-width: 155px;
      }
      .shap-track {
        flex: 1;
        height: 5px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 3px;
        overflow: hidden;
      }
      .shap-fill {
        height: 100%;
        border-radius: 3px;
      }
      .shap-v {
        font-family: var(--mono);
        font-size: 10px;
        min-width: 38px;
        text-align: right;
      }

      /* ── API status dot ── */
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .dot-ok {
        background: var(--low);
      }
      .dot-err {
        background: var(--high);
      }
      .dot-checking {
        background: var(--med);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;

      const API = "http://localhost:8000";

      /* ── helpers ── */
      const pct = (v) => (v != null ? Math.round(v * 100) : null);

      const RISK = {
        LOW: {
          color: "var(--low)",
          bg: "var(--low-dim)",
          label: "Low Risk",
          icon: "✓",
        },
        MEDIUM: {
          color: "var(--med)",
          bg: "var(--med-dim)",
          label: "Medium Risk",
          icon: "⚠",
        },
        HIGH: {
          color: "var(--high)",
          bg: "var(--high-dim)",
          label: "High Risk",
          icon: "✕",
        },
        UNKNOWN: {
          color: "var(--muted)",
          bg: "rgba(0,0,0,0)",
          label: "Unknown",
          icon: "?",
        },
      };

      const SHAP_MOCK = [
        { name: "length_of_stay", v: 0.18, pos: true },
        { name: "num_diagnoses", v: 0.14, pos: true },
        { name: "max_creatinine", v: 0.12, pos: true },
        { name: "num_prior_admissions", v: 0.1, pos: true },
        { name: "avg_hr", v: 0.08, pos: false },
        { name: "num_medications", v: 0.06, pos: true },
        { name: "max_wbc", v: 0.05, pos: true },
      ];

      /* ── Gauge ── */
      function Gauge({ value, color }) {
        // Arc: M 14 90 A 60 60 0 0 1 166 90  → length ≈ 188.5
        const ARC = 188.5;
        const filled = value != null ? (value / 100) * ARC : 0;
        return (
          <div className="gauge-wrap">
            <svg viewBox="0 0 180 110" className="gauge">
              <path className="gauge-track" d="M 14 90 A 76 76 0 0 1 166 90" />
              <path
                className="gauge-fill"
                d="M 14 90 A 76 76 0 0 1 166 90"
                stroke={color}
                strokeDasharray={`${filled} ${ARC}`}
              />
              <text
                x="90"
                y="82"
                textAnchor="middle"
                className="gauge-pct"
                fill={color}
              >
                {value != null ? `${value}%` : "—"}
              </text>
              <text x="90" y="97" textAnchor="middle" className="gauge-label">
                FUSION SCORE
              </text>
            </svg>
          </div>
        );
      }

      /* ── Score bar ── */
      function ScoreBar({ label, value, color }) {
        const p = pct(value);
        return (
          <div className="score-row">
            <span className="score-name">{label}</span>
            <div className="bar-track">
              <div
                className="bar-fill"
                style={{ width: p != null ? `${p}%` : "0%", background: color }}
              />
            </div>
            <span
              className="score-val"
              style={{ color: p != null ? color : undefined }}
            >
              {p != null ? `${p}%` : <span className="na">N/A</span>}
            </span>
          </div>
        );
      }

      /* ── Prediction card ── */
      function PredictionCard({ result }) {
        const {
          encounter_id,
          xgb_score,
          lstm_score,
          cnn_score,
          fusion_score,
          risk_level,
          weights_used,
        } = result;
        const meta = RISK[risk_level] ?? RISK.UNKNOWN;
        const fp = pct(fusion_score);

        return (
          <div className="card">
            <div
              style={{
                display: "flex",
                alignItems: "flex-start",
                justifyContent: "space-between",
                marginBottom: 18,
                gap: 12,
              }}
            >
              <div>
                <div
                  style={{
                    fontSize: 11,
                    color: "var(--muted)",
                    letterSpacing: ".07em",
                    textTransform: "uppercase",
                    marginBottom: 4,
                  }}
                >
                  Encounter #{encounter_id}
                </div>
                <div style={{ fontSize: 17, fontWeight: 600 }}>
                  Readmission Risk
                </div>
              </div>
              <div
                className="risk-badge"
                style={{
                  color: meta.color,
                  background: meta.bg,
                  borderColor: meta.color,
                }}
              >
                {meta.icon}&nbsp;{meta.label}
              </div>
            </div>

            <Gauge value={fp} color={meta.color} />

            <div className="score-list">
              <ScoreBar label="XGBoost" value={xgb_score} color="#3b82f6" />
              <ScoreBar label="LSTM" value={lstm_score} color="#a78bfa" />
              <ScoreBar label="CNN" value={cnn_score} color="#f97316" />
            </div>

            {weights_used && (
              <div className="weights">
                {Object.entries(weights_used)
                  .filter(([, w]) => w > 0)
                  .map(([k, w]) => (
                    <span key={k} className="chip">
                      {k.toUpperCase()} {Math.round(w * 100)}%
                    </span>
                  ))}
              </div>
            )}
          </div>
        );
      }

      /* ── Right panel: encounter info + placeholders ── */
      function InfoPanel({ result }) {
        const { encounter_id, fusion_score, risk_level, xgb_score } = result;

        return (
          <div className="info-panels">
            {/* Quick stats */}
            <div className="card">
              <div className="card-title">Encounter Details</div>
              <div className="enc-detail">
                {[
                  { label: "Encounter ID", val: `#${encounter_id}` },
                  { label: "Risk Level", val: risk_level },
                  {
                    label: "Fusion Score",
                    val:
                      fusion_score != null
                        ? `${Math.round(fusion_score * 100)}%`
                        : "—",
                  },
                  {
                    label: "XGBoost Score",
                    val:
                      xgb_score != null
                        ? `${Math.round(xgb_score * 100)}%`
                        : "—",
                  },
                ].map(({ label, val }) => (
                  <div key={label} className="detail-item">
                    <div className="detail-label">{label}</div>
                    <div className="detail-val">{val}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Vitals timeline placeholder */}
            <div className="placeholder">
              <div className="ph-head">
                <span className="ph-icon">📈</span>
                <span className="ph-title">Vitals Timeline (48h ICU)</span>
                <span className="ph-badge">Coming Soon</span>
              </div>
              <p className="ph-desc">
                Heart rate, blood pressure, SpO₂, temperature, and respiratory
                rate plotted hourly over the 48-hour ICU window.
              </p>
              <div className="mock-bars">
                {[
                  78, 85, 60, 92, 71, 88, 95, 67, 82, 90, 74, 88, 96, 70, 83,
                  91,
                ].map((h, i) => (
                  <div
                    key={i}
                    className="mock-bar"
                    style={{ height: `${h}%`, opacity: 0.08 + i * 0.012 }}
                  />
                ))}
              </div>
            </div>

            {/* SHAP placeholder */}
            <div className="placeholder">
              <div className="ph-head">
                <span className="ph-icon">🧠</span>
                <span className="ph-title">SHAP Feature Importance</span>
                <span className="ph-badge">Preview</span>
              </div>
              <p className="ph-desc">
                Per-patient waterfall showing which features drove the XGBoost
                score up or down. Values below are layout previews only.
              </p>
              <div className="shap-rows">
                {SHAP_MOCK.map((f) => (
                  <div key={f.name} className="shap-row">
                    <span className="shap-name">{f.name}</span>
                    <div className="shap-track">
                      <div
                        className="shap-fill"
                        style={{
                          width: `${f.v * 400}px`,
                          maxWidth: "100%",
                          background: f.pos
                            ? "rgba(239,68,68,.5)"
                            : "rgba(59,130,246,.5)",
                        }}
                      />
                    </div>
                    <span
                      className="shap-v"
                      style={{ color: f.pos ? "#f87171" : "#60a5fa" }}
                    >
                      {f.pos ? "+" : "-"}
                      {f.v.toFixed(2)}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      /* ── API status indicator ── */
      function ApiStatus() {
        const [status, setStatus] = useState("checking");
        const [models, setModels] = useState([]);

        useEffect(() => {
          fetch(`${API}/`)
            .then((r) => r.json())
            .then((d) => {
              setStatus("ok");
              setModels(d.models || []);
            })
            .catch(() => setStatus("error"));
        }, []);

        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 6,
              fontSize: 11,
              color: "var(--muted)",
            }}
          >
            <span
              className={`status-dot ${status === "ok" ? "dot-ok" : status === "error" ? "dot-err" : "dot-checking"}`}
            />
            {status === "ok"
              ? `API online · models: ${models.join(", ") || "none"}`
              : status === "error"
                ? "API offline — start uvicorn first"
                : "Connecting…"}
          </div>
        );
      }

      /* ── Main App ── */
      function App() {
        const [encId, setEncId] = useState("");
        const [imageFile, setImageFile] = useState(null);
        const [imgPreview, setImgPreview] = useState(null);
        const [result, setResult] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const fileRef = useRef();

        const handleImage = useCallback((e) => {
          const file = e.target.files[0];
          if (!file) return;
          setImageFile(file);
          setImgPreview(URL.createObjectURL(file));
        }, []);

        const handleDrop = useCallback((e) => {
          e.preventDefault();
          const file = e.dataTransfer.files[0];
          if (!file) return;
          setImageFile(file);
          setImgPreview(URL.createObjectURL(file));
        }, []);

        const predict = useCallback(async () => {
          if (!encId) {
            setError("Enter an Encounter ID first.");
            return;
          }
          setError(null);
          setResult(null);
          setLoading(true);
          try {
            let res;
            if (imageFile) {
              const form = new FormData();
              form.append("xray", imageFile); // ← matches UploadFile param name in predict.py
              res = await fetch(`${API}/predict/${encId}/with-image`, {
                method: "POST",
                body: form,
              });
            } else {
              res = await fetch(`${API}/predict/${encId}`, { method: "POST" });
            }
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              throw new Error(err.detail || `HTTP ${res.status}`);
            }
            setResult(await res.json());
          } catch (e) {
            setError(
              e.message || "Request failed. Is the API running on port 8001?",
            );
          } finally {
            setLoading(false);
          }
        }, [encId, imageFile]);

        const reset = () => {
          setEncId("");
          setImageFile(null);
          setImgPreview(null);
          setResult(null);
          setError(null);
        };

        return (
          <>
            {/* Header */}
            <header className="header">
              <div className="header-inner">
                <div className="logo">
                  <div className="logo-hex">M</div>
                  <span className="logo-name">
                    Medi<span>Predict</span>
                  </span>
                </div>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "flex-end",
                    gap: 4,
                  }}
                >
                  <span className="header-tag">
                    30-Day Readmission Risk · MIMIC-IV
                  </span>
                  <ApiStatus />
                </div>
              </div>
            </header>

            <main className="main">
              {/* Input card */}
              <div className="card">
                <div className="card-title">Run Prediction</div>
                <div className="form-row">
                  {/* Encounter ID */}
                  <div className="field">
                    <label>Encounter ID (hadm_id)</label>
                    <input
                      type="number"
                      placeholder="e.g. 22841357"
                      value={encId}
                      onChange={(e) => setEncId(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && predict()}
                    />
                  </div>
                  {/* Image upload */}
                  <div className="field">
                    <label>Chest X-Ray — optional (activates CNN)</label>
                    <div
                      className="dropzone"
                      onClick={() => fileRef.current.click()}
                      onDragOver={(e) => e.preventDefault()}
                      onDrop={handleDrop}
                    >
                      {imgPreview ? (
                        <img
                          src={imgPreview}
                          alt="preview"
                          className="drop-preview"
                        />
                      ) : (
                        <div className="dropzone-hint">
                          <span className="dropzone-icon">🩻</span>
                          <span className="dropzone-text">
                            <strong>Click or drag</strong> to upload
                            <br />
                            PNG · JPG · DICOM
                          </span>
                        </div>
                      )}
                    </div>
                    <input
                      ref={fileRef}
                      type="file"
                      accept=".png,.jpg,.jpeg,.dcm,.bmp,.tiff"
                      style={{ display: "none" }}
                      onChange={handleImage}
                    />
                  </div>
                </div>

                <div className="actions">
                  <button
                    className="btn-primary"
                    onClick={predict}
                    disabled={loading}
                  >
                    {loading ? <span className="spinner" /> : "▶"}&nbsp;
                    {loading ? "Running…" : "Predict Risk"}
                  </button>
                  {(result || error) && (
                    <button className="btn-ghost" onClick={reset}>
                      ✕ Reset
                    </button>
                  )}
                  {imageFile && !loading && (
                    <span style={{ fontSize: 12, color: "var(--muted)" }}>
                      📎 {imageFile.name}
                      <button
                        onClick={() => {
                          setImageFile(null);
                          setImgPreview(null);
                        }}
                        style={{
                          marginLeft: 6,
                          background: "none",
                          border: "none",
                          color: "var(--muted)",
                          cursor: "pointer",
                          fontSize: 12,
                        }}
                      >
                        ✕
                      </button>
                    </span>
                  )}
                </div>

                {error && <div className="error">⚠ {error}</div>}
              </div>

              {/* Results */}
              {result && (
                <div className="results">
                  <PredictionCard result={result} />
                  <InfoPanel result={result} />
                </div>
              )}
            </main>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
